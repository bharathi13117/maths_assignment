<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simpson's 1/3 Rule Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#12121a; --card:#1a1a26; --border:#2a2a3d;
    --accent:#7c3aed; --accent2:#06b6d4; --accent3:#f59e0b;
    --text:#e2e8f0; --muted:#64748b; --success:#10b981;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
    min-height:100vh;padding:2rem 1rem;
    background-image:radial-gradient(ellipse at 20% 0%,#7c3aed22 0%,transparent 50%),
                     radial-gradient(ellipse at 80% 100%,#06b6d422 0%,transparent 50%);
  }
  h1{
    text-align:center;font-size:clamp(1.8rem,5vw,3rem);font-weight:800;
    letter-spacing:-0.03em;
    background:linear-gradient(135deg,#7c3aed,#06b6d4);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:.25rem;
  }
  .subtitle{
    text-align:center;color:var(--muted);font-family:'JetBrains Mono',monospace;
    font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:2.5rem;
  }
  .container{max-width:800px;margin:0 auto;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;}
  .section-label{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent2);margin-bottom:1rem;}
  
  .input-group{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
  .input-row{display:flex;gap:1rem;flex-wrap:wrap;align-items:center;}
  
  label{font-size:.9rem;color:var(--muted);}
  
  input[type="text"], input[type="number"]{
    background:var(--surface);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:'JetBrains Mono',monospace;padding:.6rem;
    font-size:1rem;outline:none;transition:border-color .2s;
  }
  input:focus{border-color:var(--accent);}
  .fn-input{flex:1;min-width:200px;}
  
  .btn{padding:.65rem 1.8rem;border-radius:10px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#9333ea);color:white;box-shadow:0 4px 20px #7c3aed44;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px #7c3aed66;}
  
  /* Table Styles */
  .calc-table{width:100%;border-collapse:collapse;margin-top:1rem;margin-bottom:1.5rem;font-family:'JetBrains Mono',monospace;font-size:.85rem;}
  .calc-table th{text-align:left;color:var(--muted);padding:.5rem;border-bottom:1px solid var(--border);font-weight:400;}
  .calc-table td{padding:.5rem;border-bottom:1px solid #2a2a3d44;}
  .calc-table tr:last-child td{border-bottom:none;}
  .coef-1{color:var(--muted);}
  .coef-4{color:var(--success);font-weight:700;}
  .coef-2{color:var(--accent3);font-weight:600;}
  
  .result-box{
    background:var(--surface);border:1px solid var(--accent2);border-radius:12px;
    padding:1.5rem;text-align:center;margin-top:1rem;
  }
  .result-val{font-size:2rem;font-weight:800;color:var(--text);font-family:'JetBrains Mono',monospace;}
  .result-label{color:var(--accent2);font-family:'JetBrains Mono',monospace;font-size:.8rem;margin-bottom:.5rem;}

  .error{color:#fca5a5;background:#7f1d1d33;padding:1rem;border-radius:8px;border:1px solid #ef4444;margin-top:1rem;font-family:'JetBrains Mono',monospace;font-size:.9rem;}

  .math-hint{font-size:.75rem;color:var(--muted);margin-top:.25rem;}
</style>
</head>
<body>
<div class="container">
  <h1>Simpson's 1/3 Rule</h1>
  <p class="subtitle">Numerical Integration Calculator</p>

  <div class="card">
    <div class="section-label"> Input Function & Limits</div>
    
    <div class="input-group">
      <label>Function f(x)</label>
      <input type="text" id="fn" class="fn-input" placeholder="e.g., x^2, sin(x), x*exp(x)" value="x^2">
      <div class="math-hint">Supported: sin, cos, tan, log, sqrt, exp, abs, ceil, floor, round, max, min, pi, e. Use '^' for power.</div>
    </div>

    <div class="input-row">
      <div class="input-group" style="margin-bottom:0; flex:1;">
        <label>Lower Limit (a)</label>
        <input type="number" id="a" value="0" step="any">
      </div>
      <div class="input-group" style="margin-bottom:0; flex:1;">
        <label>Upper Limit (b)</label>
        <input type="number" id="b" value="2" step="any">
      </div>
      <div class="input-group" style="margin-bottom:0; flex:1;">
        <label>Intervals (n) <span style="color:var(--muted);font-size:0.7em">(Even number)</span></label>
        <input type="number" id="n" value="4" step="1" min="2">
      </div>
    </div>

    <div style="margin-top:1.5rem">
      <button class="btn btn-primary" onclick="calculate()"> Calculate Integral</button>
    </div>
  </div>

  <div id="output"></div>
</div>

<script>
function parseFn(str) {
    let expr = str.replace(/\^/g, '**');
    const funcs = ['sin','cos','tan','log','sqrt','exp','abs','ceil','floor','round','max','min'];
    funcs.forEach(f => {
        expr = expr.replace(new RegExp('\\b' + f + '\\b','g'), 'Math.' + f);
    });
    expr = expr.replace(/\bpi\b/g, 'Math.PI');
    expr = expr.replace(/\be\b/g, 'Math.E');
    return new Function('x', `return ${expr};`);
}

function simpson(a,b,n,f) {
    if (n % 2 !== 0) n++;
    const h = (b - a) / n;
    let sum = f(a) + f(b);
    const rows = [];
    for (let i = 1; i < n; i++) {
        const x = a + i * h;
        const y = f(x);
        const coeff = (i % 2 === 0) ? 2 : 4;
        sum += coeff * y;
        rows.push({x,y,coeff});
    }
    const result = (h / 3) * sum;
    return {result,rows,h};
}

function calculate() {
    const out = document.getElementById('output');
    out.innerHTML = '';
    const fnStr = document.getElementById('fn').value.trim();
    const a = parseFloat(document.getElementById('a').value);
    const b = parseFloat(document.getElementById('b').value);
    let n = parseInt(document.getElementById('n').value, 10);

    if (isNaN(a) || isNaN(b) || isNaN(n) || !fnStr) {
        out.innerHTML = '<div class="error">Please provide valid inputs.</div>';
        return;
    }
    if (n < 2) n = 2;
    if (n % 2 !== 0) {
        n++;
        document.getElementById('n').value = n;
    }
    let f;
    try {
        f = parseFn(fnStr);
        f(a);
    } catch (e) {
        out.innerHTML = '<div class="error">Unable to parse function. Use Math.* or supported functions.</div>';
        return;
    }
    const {result, rows, h} = simpson(a, b, n, f);

    let html = '';
    html += `<div class="result-box"><div class="result-label">Approximate integral</div><div class="result-val">${result}</div></div>`;
    html += `<table class="calc-table"><thead><tr><th>x</th><th>f(x)</th><th>coef</th></tr></thead><tbody>`;
    html += `<tr><td>${a}</td><td>${f(a)}</td><td class="coef-1">1</td></tr>`;
    for (const r of rows) {
        html += `<tr><td>${r.x}</td><td>${r.y}</td><td class="coef-${r.coeff}">${r.coeff}</td></tr>`;
    }
    html += `<tr><td>${b}</td><td>${f(b)}</td><td class="coef-1">1</td></tr>`;
    html += `</tbody></table>`;
    out.innerHTML = html;
}
</script>
</body>
</html>
